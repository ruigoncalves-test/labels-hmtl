<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Classificador de Categorias — Pro Edition</title>
<style>
  :root {
    --bg-1: #0a0d14;
    --bg-2: #0f131c;
    --panel: rgba(24, 27, 36, 0.7);
    --border: rgba(255, 255, 255, 0.08);
    --border-strong: rgba(255, 255, 255, 0.14);
    --text: #e8eaf2;
    --muted: #8a93a8;
    --accent: #7c5cff;
    --accent-2: #4ea8ff;
    --accent-3: #ff6cab;
    --success: #4ade80;
    --warn: #fbbf24;
    --error: #f87171;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, sans-serif;
    color: var(--text);
    line-height: 1.55;
    background:
      radial-gradient(1200px 600px at 10% -10%, rgba(124,92,255,.18), transparent 60%),
      radial-gradient(900px 500px at 110% 10%, rgba(78,168,255,.15), transparent 60%),
      radial-gradient(800px 500px at 50% 120%, rgba(255,108,171,.12), transparent 60%),
      linear-gradient(180deg, var(--bg-1), var(--bg-2));
    background-attachment: fixed;
    min-height: 100vh;
  }
  .container { max-width: 1180px; margin: 0 auto; padding: 40px 24px 100px; }
  header { text-align: center; margin-bottom: 40px; }
  h1 {
    font-size: 42px; margin: 0 0 8px;
    font-weight: 800; letter-spacing: -0.02em;
    background: linear-gradient(135deg, #fff, #b9a7ff 50%, #7ed3ff);
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  .subtitle { color: var(--muted); font-size: 15px; max-width: 600px; margin: 0 auto; }
  .badge {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 4px 12px;
    background: rgba(74,222,128,.12);
    border: 1px solid rgba(74,222,128,.3);
    border-radius: 999px; font-size: 12px;
    color: #86efac; margin-bottom: 14px;
  }
  .badge::before {
    content: ""; width: 6px; height: 6px; border-radius: 50%;
    background: #4ade80; box-shadow: 0 0 8px #4ade80;
    animation: pulse 1.6s ease-in-out infinite;
  }
  @keyframes pulse { 50% { opacity: .4; } }

  .card {
    background: var(--panel);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px;
    margin-bottom: 20px;
    box-shadow: 0 1px 0 rgba(255,255,255,.04) inset, 0 30px 60px -30px rgba(0,0,0,.6);
  }

  label {
    display: flex; align-items: center; gap: 6px;
    font-size: 12px; color: var(--muted); margin-bottom: 8px;
    text-transform: uppercase; letter-spacing: 0.05em; font-weight: 600;
  }
  input[type="text"], select {
    width: 100%; padding: 12px 14px;
    background: rgba(15, 19, 28, 0.7);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text); font-size: 14px; outline: none;
    transition: border-color .15s, box-shadow .15s, background .15s;
  }
  input:focus, select:focus {
    border-color: var(--accent);
    background: rgba(15, 19, 28, 0.9);
    box-shadow: 0 0 0 4px rgba(124,92,255,.15);
  }
  .row { display: grid; grid-template-columns: 1fr 200px 200px; gap: 14px; margin-bottom: 16px; }
  @media (max-width: 800px) { .row { grid-template-columns: 1fr; } }

  button {
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    color: #fff; border: none; padding: 12px 24px;
    border-radius: 10px; font-weight: 600; font-size: 14px;
    cursor: pointer;
    transition: transform .12s, box-shadow .15s, opacity .15s;
    box-shadow: 0 8px 20px -8px rgba(124,92,255,.6);
    display: inline-flex; align-items: center; gap: 8px;
  }
  button:hover:not(:disabled) {
    transform: translateY(-1px);
    box-shadow: 0 12px 28px -8px rgba(124,92,255,.7);
  }
  button:disabled { opacity: .5; cursor: not-allowed; }
  
  .status {
    padding: 12px 16px; border-radius: 10px; font-size: 14px;
    margin-top: 14px; display: flex; align-items: center; gap: 10px;
    animation: slideIn .25s ease; word-break: break-word;
  }
  @keyframes slideIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: none; } }
  .status.info    { background: rgba(78,168,255,.1);  color: var(--accent-2); border: 1px solid rgba(78,168,255,.2); }
  .status.success { background: rgba(74,222,128,.1);  color: var(--success);  border: 1px solid rgba(74,222,128,.2); }
  .status.warn    { background: rgba(251,191,36,.1);  color: var(--warn);     border: 1px solid rgba(251,191,36,.2); }
  .status.error   { background: rgba(248,113,113,.1); color: var(--error);    border: 1px solid rgba(248,113,113,.2); }

  .spinner {
    width: 14px; height: 14px; border: 2px solid currentColor; border-top-color: transparent;
    border-radius: 50%; animation: spin .8s linear infinite; flex-shrink: 0;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 14px; margin-bottom: 20px; }
  .stat {
    background: var(--panel); backdrop-filter: blur(16px); border: 1px solid var(--border);
    border-radius: 14px; padding: 18px 20px; transition: border-color .2s, transform .2s;
  }
  .stat .num {
    font-size: 28px; font-weight: 800; background: linear-gradient(135deg, #fff, #b9a7ff);
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  .stat .lbl { color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: 0.05em; margin-top: 4px; }

  .table-wrap { overflow-x: auto; border-radius: 10px; }
  table { width: 100%; border-collapse: collapse; font-size: 14px; }
  thead th {
    color: var(--muted); font-weight: 600; font-size: 11px; text-transform: uppercase;
    padding: 12px 14px; text-align: left; border-bottom: 1px solid var(--border-strong);
    background: rgba(255,255,255,0.02);
  }
  tbody td { padding: 12px 14px; border-bottom: 1px solid var(--border); }
  .label-pill {
    display: inline-block; padding: 4px 12px; background
